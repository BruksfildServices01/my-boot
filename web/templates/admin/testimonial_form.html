{{define "content"}}
<div class="max-w-xl mx-auto px-4 py-8">
  <div class="mb-6">
    <a href="/admin/myboot" class="text-sm text-gray-500 hover:text-gray-800">← Voltar</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-2">Adicionar mídia</h1>
  </div>

  {{if .Error}}
  <div class="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl">{{.Error}}</div>
  {{end}}

  <form method="POST" action="/admin/myboot/criar" enctype="multipart/form-data" class="space-y-5">

    <!-- Tipo -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Tipo</label>
      <div class="flex gap-3">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="tipo" value="video" id="tipo-video" checked
            onchange="toggleTipo(this.value)" class="accent-gray-900">
          <span class="text-sm font-medium">▶ Vídeo (YouTube)</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="tipo" value="image" id="tipo-image"
            onchange="toggleTipo(this.value)" class="accent-gray-900">
          <span class="text-sm font-medium">🖼 Print / Foto</span>
        </label>
      </div>
    </div>

    <!-- Campo vídeo -->
    <div id="campo-video">
      <label class="block text-sm font-semibold text-gray-700 mb-1">URL do YouTube</label>
      <input type="url" name="youtube_url" placeholder="https://www.youtube.com/watch?v=..."
        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-900">
      <p class="text-xs text-gray-400 mt-1">Cole o link do vídeo — suporta youtube.com e youtu.be</p>
    </div>

    <!-- Campo imagem -->
    <div id="campo-image" class="hidden">
      <label class="block text-sm font-semibold text-gray-700 mb-1">Print / Foto</label>
      <input type="file" name="imagem" accept="image/*"
        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm file:mr-3 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700">
    </div>

    <!-- Legenda -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Legenda <span class="text-gray-400 font-normal">(opcional)</span></label>
      <input type="text" name="legenda" placeholder="Ex: Entrega na zona sul de SP"
        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-gray-900">
    </div>

    <!-- Visível -->
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="visivel" value="1" checked class="w-4 h-4 accent-gray-900">
      <span class="text-sm font-medium text-gray-700">Visível na página pública</span>
    </label>

    <button type="submit"
      class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition-colors">
      Salvar
    </button>
  </form>
</div>

<script>
function toggleTipo(val) {
  document.getElementById('campo-video').classList.toggle('hidden', val !== 'video');
  document.getElementById('campo-image').classList.toggle('hidden', val !== 'image');
}
</script>
{{end}}
